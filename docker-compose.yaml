services:
  rag_api:
    build: ./rag_api
    ports:
      - "8000:8000"
    volumes:
      - ./rag_api/uploads:/app/uploads
      - chroma_data:/app/chroma_data
    environment:
      - VECTOR_DB_TYPE=chroma
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - DEBUG_RAG_API=true
      - RAG_OPENAI_API_KEY=${OPENAI_API_KEY:-}
    env_file:
      - .env

volumes:
  chroma_data:
