name: Autonomous Production Improvement

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Specific improvement task (leave empty for auto-detect)'
        required: false
        type: string
  push:
    branches:
      - production/*

jobs:
  improve:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install > /tmp/install_opencode.sh
          bash /tmp/install_opencode.sh

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Configure git
        run: |
          git config --global user.name "opencode-automation"
          git config --global user.email "opencode@github.com"

      - name: Run opencode autonomous improvement
        if: github.event_name != 'push'
        id: opencode
        env:
          OPENCODE_EXPERIMENTAL: true
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            TASK="${{ github.event.inputs.task }}"
          else
            TASK="Run one cycle of autonomous production improvement. Read AGENTS.md for the checklist and rules."
          fi

          opencode run "$TASK" 2>&1 | tee opencode_output.log

      - name: Create PRs from production branches
        id: create_pr
        run: |
          git fetch origin
          COUNT=0
          for branch in $(git branch -r | grep "origin/production/" | sed 's/origin\///' | sort -u); do
            PR_EXISTS=$(gh pr list --head "$branch" --state open --json number --jq 'length')
            if [ "$PR_EXISTS" -eq 0 ]; then
              COMMITS=$(git log origin/main..origin/$branch --oneline 2>/dev/null | wc -l)
              if [ "$COMMITS" -gt 0 ]; then
                COMMIT_MSG=$(git log origin/main..origin/$branch --format="%s" --reverse | head -1)
                gh pr create \
                  --base main \
                  --head "$branch" \
                  --title "$COMMIT_MSG" \
                  --body "Autonomous PR from \`$branch\`" \
                  --label production
                COUNT=$((COUNT + 1))
                echo "Created PR for $branch"
              fi
            fi
          done
          echo "count=$COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge production PRs
        if: steps.create_pr.outputs.count != '0'
        run: |
          for number in $(gh pr list --label production --state open --json number --jq '.[].number'); do
            gh pr merge "$number" --squash --auto
            echo "Auto-merge queued for PR #$number"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
