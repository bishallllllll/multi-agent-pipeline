name: Autonomous Production Improvement

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Specific improvement task (leave empty for auto-detect)'
        required: false
        type: string

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install > /tmp/install_opencode.sh
          bash /tmp/install_opencode.sh

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Configure git
        run: |
          git config --global user.name "opencode-automation"
          git config --global user.email "opencode@github.com"

      - name: Run opencode autonomous improvement
        id: opencode
        env:
          OPENCODE_EXPERIMENTAL: true
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            TASK="${{ github.event.inputs.task }}"
          else
            TASK="Run one cycle of autonomous production improvement. Read AGENTS.md for the checklist and rules."
          fi

          opencode run "$TASK" 2>&1 | tee opencode_output.log

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git status --porcelain | grep -q .; then
            echo "No changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "feat(production): autonomous improvements"
          git push origin main
          echo "Changes pushed to main"