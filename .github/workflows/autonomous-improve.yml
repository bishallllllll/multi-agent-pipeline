name: Autonomous Production Improvement

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Specific improvement task (leave empty for auto-detect)'
        required: false
        type: string
  issue_comment:
    types: [created]

jobs:
  improve:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/opencode improve'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install > /tmp/install_opencode.sh
          bash /tmp/install_opencode.sh

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Configure git
        run: |
          git config --global user.name "opencode-automation"
          git config --global user.email "opencode@github.com"

      - name: Run opencode autonomous improvement
        id: opencode
        env:
          OPENCODE_EXPERIMENTAL: true
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            TASK="${{ github.event.inputs.task }}"
          else
            TASK="Run one cycle of autonomous production improvement. Read AGENTS.md for the checklist and rules."
          fi

          opencode run "$TASK" 2>&1 | tee opencode_output.log

      - name: Check for new PR from opencode
        id: check_pr
        run: |
          PR_COUNT=$(gh pr list --author "opencode-automation" --state open --json number --jq 'length')
          echo "count=$PR_COUNT" >> $GITHUB_OUTPUT
          if [ "$PR_COUNT" -gt 0 ]; then
            PR_NUMBER=$(gh pr list --author "opencode-automation" --state open --json number --jq '.[0].number')
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label and auto-merge PR
        if: steps.check_pr.outputs.count != '0'
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.number }}"
          gh pr label "$PR_NUMBER" --add production
          gh pr merge "$PR_NUMBER" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
